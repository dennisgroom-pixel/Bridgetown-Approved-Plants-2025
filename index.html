<style>
  :root {
    --green-deep: #1a3022;
    --green-mid: #2d5a3d;
    --gold: #c9a84c;
    --cream: #f5f0e8;

    --border: #e0d8c8;
    --muted: #666;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: #1a1a1a; min-height: 100vh; }

  header { background: var(--green-deep); padding: 18px 16px 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .header-top h1 { font-family: 'Playfair Display', serif; font-size: 20px; color: #f5f0e8; }
  .header-top p { font-size: 11px; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; }
  .search-wrap { position: relative; }
  .search-wrap input { width: 100%; padding: 10px 14px 10px 36px; border-radius: 10px; border: none; background: rgba(255,255,255,0.13); color: #fff; font-size: 15px; outline: none; font-family: 'DM Sans', sans-serif; }
  .search-wrap input::placeholder { color: rgba(255,255,255,0.45); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.5; }

  .filter-bar { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; background: var(--green-mid); scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,0.25); background: transparent; color: rgba(255,255,255,0.8); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: var(--green-deep); font-weight: 700; }

  .stats-bar { padding: 9px 16px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
  .stats-bar strong { color: var(--green-mid); }

  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
  @media (min-width: 600px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px) { .grid { grid-template-columns: repeat(4, 1fr); } }

  .card { background: var(--card-bg); border-radius: 14px; overflow: hidden; border: 1px solid var(--border); cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.07); transition: transform 0.15s; }
  .card:active { transform: scale(0.97); }

  .card-img { position: relative; width: 100%; padding-top: 100%; background: #d8e8dc; }
  .card-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s; }
  .card-img img.loaded { opacity: 1; }
  .placeholder { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 28px; color: #4a8c5c; gap: 4px; }
  .placeholder span { font-size: 10px; color: #999; }

  .card-body { padding: 10px 12px 12px; }
  .card-common { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: var(--green-deep); line-height: 1.3; margin-bottom: 3px; }
  .card-sci { font-size: 11px; font-style: italic; color: var(--muted); margin-bottom: 7px; }
  .badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; background: #1a1a1a; color: #fff; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #fff; width: 100%; max-height: 88vh; border-radius: 24px 24px 0 0; overflow-y: auto; transform: translateY(40px); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 14px auto 0; }
  .modal-img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; margin-top: 12px; background: #d8e8dc; }
  .modal-body { padding: 20px 20px 40px; }
  .modal-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: var(--green-deep); margin-bottom: 4px; }
  .modal-sci { font-style: italic; color: var(--muted); font-size: 15px; margin-bottom: 14px; }
  .modal-meta { margin-bottom: 20px; }
  .info-row { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid #f0ece4; font-size: 14px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-weight: 700; color: var(--green-mid); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; width: 110px; flex-shrink: 0; padding-top: 1px; }
  .info-val { color: #333; }
  .info-val.approved { color: var(--green-mid); font-weight: 700; }
  .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: rgba(0,0,0,0.2); border: none; color: #fff; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .modal-credit { font-size: 11px; color: #888; text-align: center; padding: 8px 20px 4px; }
  .modal-credit a { color: #2d5a3d; font-weight: 600; text-decoration: underline; }
  .page-footer { text-align: center; padding: 24px 20px 40px; font-size: 12px; color: #888; border-top: 1px solid var(--border); margin-top: 8px; line-height: 1.9; }
  .page-footer a { color: var(--green-mid); font-weight: 600; text-decoration: underline; }
  .back-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--green-deep); color: #fff; border: none; border-radius: 12px; padding: 14px 20px; font-size: 16px; font-weight: 700; cursor: pointer; width: calc(100% - 40px); margin: 16px 20px 8px; font-family: 'DM Sans', sans-serif; letter-spacing: 0.3px; }
  .back-btn:active { opacity: 0.8; }
  .placeholder.retryable { cursor: pointer; }
  .placeholder.retryable:hover { background: rgba(0,0,0,0.03); }
  .retry-hint { font-size: 10px; color: #2d5a3d; font-weight: 600; }
  .modal-img-ph { width: 100%; aspect-ratio: 16/9; background: #d8e8dc; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-size: 48px; margin-top: 12px; cursor: pointer; }
  .modal-img-ph .retry-hint { font-size: 14px; color: #2d5a3d; font-weight: 600; }

  .no-results { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); }
  .no-results .big { font-size: 48px; margin-bottom: 12px; }
</style>
</head>

  {common:"Walter's Viburnum",scientific:"Viburnum obovatum",category:"Tree"},
  {common:"White Geiger",scientific:"Cordia boissieri",category:"Tree"},
  {common:"Ylang Ylang",scientific:"Cananga odorata",category:"Tree"},
];

const CATS = ['All','Annual','Perennial','Annual / Perennial','Grass','Ground Cover','Palm','Shrub','Tree'];
const imgCache = {};
let activeFilter = 'All';
let searchQuery = '';
let currentPlant = null;

// Build filter bar
const filterBar = document.getElementById('filterBar');
CATS.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.onclick = () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = cat;
    renderGrid();
  };
  filterBar.appendChild(btn);
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

function filtered() {
  return PLANTS.filter(p => {
    const matchCat = activeFilter === 'All' || p.category === activeFilter;
    const q = searchQuery.toLowerCase();
    return matchCat && (!q || p.common.toLowerCase().includes(q) || p.scientific.toLowerCase().includes(q));
  });
}

// Rate-limited image fetch queue
const fetchQueue = [];
let activeFetches = 0;
const MAX_CONCURRENT = 3;
const FETCH_DELAY = 300; // ms between fetches

function queueFetch(plant, callback) {
  fetchQueue.push({plant, callback});
  processQueue();
}

function processQueue() {
  if (activeFetches >= MAX_CONCURRENT || fetchQueue.length === 0) return;
  const {plant, callback} = fetchQueue.shift();
  activeFetches++;
  const key = plant.scientific;
  if (imgCache[key] !== undefined) {
    activeFetches--;
    callback(imgCache[key]);
    setTimeout(processQueue, 0);
    return;
  }
  const q = plant.scientific.split(' ').slice(0,2).join(' ');
  fetch(`https://api.inaturalist.org/v1/taxa?q=${encodeURIComponent(q)}&per_page=1&locale=en`)
    .then(r => r.json())
    .then(d => {
      const url = d.results?.[0]?.default_photo?.medium_url || '';
      imgCache[key] = url;
      callback(url);
    })
    .catch(() => { imgCache[key] = ''; callback(''); })
    .finally(() => {
      activeFetches--;
      setTimeout(processQueue, FETCH_DELAY);
    });
}

function renderGrid() {
  const plants = filtered();
  const grid = document.getElementById('grid');
  document.getElementById('countDisplay').textContent = plants.length;
  document.getElementById('catDisplay').textContent = activeFilter !== 'All' ? activeFilter : 'All categories';
  grid.innerHTML = '';

  if (plants.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="big">🌱</div><p>No plants found.</p></div>`;
    return;
  }

  plants.forEach((plant, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const uid = `c${i}${Date.now()}`;
    card.innerHTML = `
      <div class="card-img">
        <div class="placeholder" id="ph-${uid}">🌿<span>Loading…</span></div>
        <img id="img-${uid}" alt="${plant.common}">
      </div>
      <div class="card-body">
        <div class="card-common">${plant.common}</div>
        <div class="card-sci">${plant.scientific}</div>
        <span class="badge">${plant.category}</span>
      </div>`;
    card.onclick = () => openModal(plant);
    grid.appendChild(card);

    queueFetch(plant, url => {
      const img = document.getElementById(`img-${uid}`);
      const ph = document.getElementById(`ph-${uid}`);
      if (!img) return;
      if (url) {
        img.src = url;
        img.onload = () => { img.classList.add('loaded'); if(ph) ph.style.display='none'; };
      } else {
        // No photo found — make placeholder clickable to retry
        if (ph) {
          ph.querySelector('span').textContent = 'Tap to retry';
          ph.classList.add('retryable');
          ph.innerHTML = '🌿<span class="retry-hint">Tap for photo</span>';
          ph.onclick = (e) => {
            e.stopPropagation();
            ph.innerHTML = '🌿<span>Retrying…</span>';
            ph.classList.remove('retryable');
            delete imgCache[plant.scientific];
            queueFetch(plant, retryUrl => {
              if (retryUrl) {
                img.src = retryUrl;
                img.onload = () => { img.classList.add('loaded'); ph.style.display='none'; };
              } else {
                ph.innerHTML = '🌿<span class="retry-hint">Tap for photo</span>';
                ph.classList.add('retryable');
              }
            });
          };
        }
      }
    });
  });
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function openModal(plant) {
  currentPlant = plant;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="modal-handle"></div>
    <div id="modal-img-area"><div class="modal-img-ph" id="modal-ph">🌿<span class="retry-hint">Tap to load photo</span></div></div>
    <button class="back-btn" onclick="closeModal()">← Back to All Plants</button>
    <div class="modal-body">
      <div class="modal-name">${plant.common}</div>
      <div class="modal-sci">${plant.scientific}</div>
      <div class="modal-meta"><span class="badge">${plant.category}</span></div>
      <div class="info-row"><span class="info-label">Common Name</span><span class="info-val">${plant.common}</span></div>
      <div class="info-row"><span class="info-label">Scientific</span><span class="info-val"><em>${plant.scientific}</em></span></div>
      <div class="info-row"><span class="info-label">Category</span><span class="info-val">${plant.category}</span></div>
      <div class="info-row"><span class="info-label">HOA Status</span><span class="info-val approved">✓ Approved for Bridgetown</span></div>
    </div>
    <div class="modal-credit">📷 Photo sourced from <a href="https://www.inaturalist.org" target="_blank">iNaturalist.org</a> — © respective contributors (CC BY-NC)</div>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  function loadModalImage() {
    const ph = document.getElementById('modal-ph');
    if (ph) { ph.innerHTML = '🌿<span class="retry-hint">Loading…</span>'; ph.onclick = null; }
    queueFetch(plant, url => {
      const area = document.getElementById('modal-img-area');
      if (!area) return;
      if (url) {
        const img = document.createElement('img');
        img.className = 'modal-img';
        img.src = url;
        img.alt = plant.common;
        area.innerHTML = '';
        area.appendChild(img);
      } else {
        // Allow retry tap on modal placeholder too
        const ph2 = document.getElementById('modal-ph');
        if (ph2) {
          ph2.innerHTML = '🌿<span class="retry-hint">Tap to retry photo</span>';
          ph2.onclick = () => { delete imgCache[plant.scientific]; loadModalImage(); };
        }
      }
    });
  }

  // If already cached as empty, show tap-to-load immediately; otherwise auto-load
  if (imgCache[plant.scientific] === '') {
    const ph = document.getElementById('modal-ph');
    if (ph) ph.onclick = () => { delete imgCache[plant.scientific]; loadModalImage(); };
  } else {
    loadModalImage();
  }
}

document.getElementById('overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderGrid();
</script>
</body>
</html>
